<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - WattSense</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="center-screen">
    <div class="glass-panel auth-box" style="max-width: 600px; padding: 50px;">
        <i class="fa-solid fa-house-signal text-blue" style="font-size: 3rem; margin-bottom: 20px;"></i>
        <h2 class="page-title mb-20">Configure Your Home</h2>
        <p class="text-muted" style="margin-bottom: 40px;">To predict your exact Phantom Power Leak threshold, we need a baseline of your household parameters.</p>
        
        <form action="dashboard.html" method="GET" style="text-align: left;">
            <div class="input-group">
                <label>Household Size</label>
                <select required>
                    <option value="" disabled selected>Select BHK size...</option>
                    <option value="1">1 BHK Apartment</option>
                    <option value="2">2 BHK Apartment</option>
                    <option value="3">3 BHK Apartment</option>
                    <option value="4">4+ BHK / Independent House</option>
                </select>
            </div>

            <div class="input-group" style="margin-top: 25px;">
                <label>Electricity Rate (₹ per kWh)</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="number" placeholder="8.0" step="0.1" value="8.0" style="flex: 1;">
                    <span class="text-muted text-sm">(Default standard METRO tier)</span>
                </div>
            </div>

            <div class="input-group" style="margin-top: 25px;">
                <label>How many Wi-Fi routers do you leave plugged in 24/7?</label>
                <input type="number" value="1" min="0" max="5">
            </div>

            <button type="submit" class="btn-primary mt-15" style="padding: 15px; font-size: 1.1rem; border-radius: 12px; margin-top: 30px;">
                Initialize Dashboard <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
    </div>
</body>
</html>

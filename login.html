<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WattSense</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="center-screen">
    <div class="glass-panel auth-box">
        <div class="auth-logo"><i class="fa-solid fa-leaf text-green"></i> WattSense</div>
        <h2 class="mb-20">Welcome Back</h2>
        <p class="text-muted mb-20">Sign in to monitor your grid.</p>
        
        <div id="error-box" class="text-red text-sm mb-20 hidden"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-primary" style="padding: 15px; font-size: 1.1rem;">Sign In</button>
        </form>

        <p class="mt-15 text-muted">Don't have an account? <a href="signup.html" class="text-green">Create one</a></p>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await API.login(email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                const box = document.getElementById('error-box');
                box.innerText = err.message;
                box.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
